{% set nav_items = [
  ("/", "Dashboard"),
  ("/filaments", "Filaments"),
  ("/inventory", "Inventory"),
  ("/printers", "Printers"),
  ("/settings", "Settings"),
] %}
<nav class="border-b border-slate-200 bg-slate-50/80 backdrop-blur dark:border-slate-800 dark:bg-slate-900/60">
  <div class="mx-auto flex max-w-6xl items-center gap-6 px-4 py-3">
    <a href="/" class="text-lg font-semibold tracking-tight text-emerald-600 dark:text-emerald-400">MakeTrack</a>
    <div class="flex gap-1 text-sm">
      {% for href, label in nav_items %}
        <a href="{{ href }}"
           class="rounded px-3 py-1.5 text-slate-600 hover:bg-slate-200 hover:text-slate-900 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-white">{{ label }}</a>
      {% endfor %}
    </div>
  </div>
</nav>
