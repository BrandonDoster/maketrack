{% set nav_items = [
  ("/", "Dashboard"),
  ("/filaments", "Filaments"),
  ("/sources", "Sources"),
] %}
<nav class="border-b border-slate-800 bg-slate-900/60 backdrop-blur">
  <div class="mx-auto flex max-w-6xl items-center gap-6 px-4 py-3">
    <a href="/" class="text-lg font-semibold tracking-tight text-emerald-400">MakeTrack</a>
    <div class="flex gap-1 text-sm">
      {% for href, label in nav_items %}
        <a href="{{ href }}"
           class="rounded px-3 py-1.5 text-slate-300 hover:bg-slate-800 hover:text-white">{{ label }}</a>
      {% endfor %}
    </div>
  </div>
</nav>
