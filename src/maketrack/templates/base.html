<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MakeTrack{% endblock %}</title>
  {# FOUC-prevention: apply the theme class on <html> before any styles
     evaluate. Reads the maketrack_theme cookie, falls back to OS preference. #}
  <script>
    (function () {
      var match = document.cookie.match(/(?:^|;\s*)maketrack_theme=([^;]+)/);
      var choice = match ? match[1] : 'auto';
      var dark = choice === 'dark' ||
        (choice === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', dark);
    })();
  </script>
  {% if tailwind_compiled() %}
    <link rel="stylesheet" href="/static/tailwind.css">
  {% else %}
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
  {% endif %}
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/vendor/alpine.min.js" defer></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body class="h-full min-h-screen bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  {% include "_nav.html" %}
  <main class="mx-auto max-w-6xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
