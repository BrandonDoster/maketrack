<div class="mb-6 flex items-center justify-between rounded border border-amber-300 bg-amber-50 px-4 py-3 text-sm text-amber-900 dark:border-amber-700 dark:bg-amber-950/30 dark:text-amber-200">
  <div>
    <strong class="font-semibold">Read-only.</strong>
    This filament is sourced from <span class="font-mono">{{ banner.source }}</span> and can't be edited here.
  </div>
  {% if banner.external_url %}
    <a href="{{ banner.external_url }}" target="_blank" rel="noopener"
       class="rounded bg-amber-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-amber-500">
      Open in {{ banner.source }} ↗
    </a>
  {% endif %}
</div>
