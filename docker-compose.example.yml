services:
  maketrack:
    image: ghcr.io/bdoster/maketrack:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./maketrack-data:/data
      - ./maketrack-uploads:/uploads
    environment:
      - TZ=America/Los_Angeles
      - MAKETRACK_LOG_LEVEL=INFO

  # Optional: Spoolman as an external filament source.
  # MakeTrack connects to it through the UI (External Sources -> Add).
  spoolman:
    image: ghcr.io/donkie/spoolman:latest
    restart: unless-stopped
    ports:
      - "7912:8000"
    volumes:
      - ./spoolman-data:/home/app/.local/share/spoolman
    environment:
      - TZ=America/Los_Angeles
