name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        # astral-sh/setup-uv stopped publishing floating @vN / @vN.N tags
        # as of v8 (see issue #830); pin to a specific patch version.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.10"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: ruff check
        run: uv run ruff check

      - name: ruff format --check
        run: uv run ruff format --check

      - name: pytest
        run: uv run pytest

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Trivy filesystem scan
        # Reports HIGH+CRITICAL findings in deps + Dockerfile to the job log.
        # Non-blocking on PRs; the release workflow gates pushes on CRITICAL.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
